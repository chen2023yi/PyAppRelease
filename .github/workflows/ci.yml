name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  powerShellChecks:
    name: PowerShell checks (windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install PSScriptAnalyzer and run
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -AllowClobber -SkipPublisherCheck
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -SettingsFile '.\PSScriptAnalyzerSettings.psd1'
          $errs = $results | Where-Object { $_.Severity -eq 'Error' }
          if ($errs -and $errs.Count -gt 0) {
            Write-Error "PSScriptAnalyzer found errors"
            $errs | ForEach-Object { Write-Error ($_.RuleName + ": " + $_.Message) }
            exit 2
          } else {
            Write-Host 'PSScriptAnalyzer: no errors (errors list empty)'
          }

      - name: Create venv and install PyInstaller
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python -m pip install --upgrade pip
          .\.venv\Scripts\pip install pyinstaller

      - name: Import PowerShell module and run dry-run
        shell: pwsh
        run: |
          Import-Module .\PyAppRelease.psm1 -Force
          Write-Host "Module imported OK"
          if (Test-Path .\release.config.psd1) {
            Write-Host "Found release.config.psd1 — running DryRun"
            Invoke-PyAppRelease -ConfigFile 'release.config.psd1' -DryRun
          } else {
            Write-Host "No release.config.psd1 found — skipping DryRun"
          }

      - name: Install Pester and run tests
        shell: pwsh
        run: |
          Install-Module -Name Pester -Force -Scope CurrentUser -SkipPublisherCheck -AllowClobber
          Invoke-Pester -Script @{ Path = '.\tests'; Output = 'JUnit' } -PassThru

      - name: PowerShell syntax check
        shell: pwsh
        run: |
          Get-ChildItem -Path . -Filter *.ps1 -Recurse | ForEach-Object {
            Write-Host "Checking $_.FullName"
            try { [scriptblock]::Create((Get-Content $_.FullName -Raw)) > $null; Write-Host "OK: $_.FullName" } catch { Write-Error "Syntax error: $_"; exit 2 }
          }
